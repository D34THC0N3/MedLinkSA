<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register as Patient – MedLink SA</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/glassmorphism.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .back-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      color: var(--text-primary);
      font-size: var(--fs-sm);
      font-weight: 500;
      margin-bottom: 24px;
      transition: all var(--transition-base);
    }
    .back-nav:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(29,140,145,0.4);
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(29, 140, 145, 0.15);
      border: 1px solid rgba(29, 140, 145, 0.3);
      color: var(--text-primary);
      font-size: var(--fs-xs);
      font-weight: 700;
      margin-bottom: 14px;
    }
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 480px) {
      .form-grid-2 { grid-template-columns: 1fr; }
    }
    .auth-form-wrapper {
      max-height: 70vh;
      overflow-y: auto;
    }
    .auth-form-wrapper::-webkit-scrollbar {
      width: 4px;
    }
    .auth-form-wrapper::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
  </style>
</head>
<body class="page-base">
  <div id="page-transition-curtain" class="transition-curtain">
    <div class="transition-curtain-glow"></div>
    <div class="transition-curtain-logo">
      <i data-lucide="activity" style="width:40px;height:40px;"></i>
      <span>MedLink SA</span>
    </div>
  </div>

  <div class="auth-page">
    <div class="auth-left scroll-reveal reveal-left">
      <div class="auth-container">
        <a href="get-started.html" class="back-nav">
          <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
          Back to roles
        </a>
        <a href="index.html" class="auth-logo" style="margin-bottom:20px;">
          <div class="auth-logo-icon"><i data-lucide="activity" style="color:white;"></i></div>
          <span class="auth-logo-text">MedLink SA</span>
        </a>

        <div class="auth-form-wrapper liquid-glass" style="padding: 32px;">
          <div class="role-badge">
            <i data-lucide="user-heart" style="width:16px;height:16px;"></i>
            Patient Registration
          </div>

          <div class="auth-header" style="margin-bottom: 22px;">
            <h1 class="auth-title">Create your patient account</h1>
            <p class="auth-subtitle">Book appointments, manage prescriptions and access your health records</p>
          </div>

          <form onsubmit="handleRegister(event, 'patient')">
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" class="form-input" placeholder="John" required />
              </div>
              <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-input" placeholder="Doe" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-input" placeholder="john.doe@example.com" required />
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-input" placeholder="+27 82 123 4567" required />
            </div>
            <div class="form-group">
              <label class="form-label">ID Number</label>
              <input type="text" class="form-input" placeholder="8001015009089" required />
            </div>
            <div class="form-group">
              <label class="form-label">Date of Birth</label>
              <input type="date" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label">Medical Aid / Insurance</label>
              <select class="form-select">
                <option value="">Select scheme (optional)</option>
                <option>Discovery Health</option>
                <option>Bonitas</option>
                <option>Momentum Health</option>
                <option>Medihelp</option>
                <option>FedHealth</option>
                <option>None / Cash</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Emergency Contact</label>
              <input type="text" class="form-input" placeholder="Name + phone number" />
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Create a strong password" required minlength="8" />
              </div>
              <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" placeholder="Re-enter password" required minlength="8" />
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Create Account</button>
            <p style="text-align:center;font-size:var(--fs-xs);color:var(--text-tertiary);margin-top:14px;">
              Already have an account? <a href="login.html" style="color:var(--primary-light);">Sign in</a>
            </p>
          </form>
        </div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-illustration">
        <div class="float-el float-el-1">
          <div class="float-icon" style="background:var(--gradient-primary);"><i data-lucide="calendar-plus" style="width:18px;height:18px;color:#fff;"></i></div>
          <div class="float-text"><span class="lbl">Next appointment</span><span class="val">Thu 09:00</span></div>
        </div>
        <div class="float-el float-el-2">
          <div class="float-icon" style="background:linear-gradient(135deg, #F59E0B, #EF4444);"><i data-lucide="pill" style="width:18px;height:18px;color:#fff;"></i></div>
          <div class="float-text"><span class="lbl">Prescriptions</span><span class="val">3 active</span></div>
        </div>
        <img src="../Gemini_Generated_Image_i25ds6i25ds6i25d.png" alt="Patient illustration" style="width:100%;border-radius:var(--radius-xl);position:relative;z-index:2;" onerror="this.style.display='none'" />
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function handleRegister(e, role) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Creating Account...';
      setTimeout(() => {
        btn.textContent = 'Account Created ✓';
        btn.style.background = 'linear-gradient(135deg, #10B981, #059669)';
        setTimeout(() => {
          window.location.href = `patient/dashboard.html`;
        }, 800);
      }, 1200);
    }
    lucide.createIcons();
  </script>
</body>
</html>
