<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MedLink SA — The Future of Healthcare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #070707; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #splash-canvas { position: fixed; inset: 0; z-index: 0; display: block; }
    #splash-ui { position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    #splash-ui > * { pointer-events: auto; }
    .splash-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; opacity: 0; animation: fadeUp 1s ease 0.5s forwards; }
    .splash-logo svg { width: 28px; height: 28px; }
    .splash-logo span { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; color: #F8FAFC; }
    .splash-tagline { font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(248,250,252,0.35); margin-bottom: 32px; opacity: 0; animation: fadeUp 1s ease 0.8s forwards; }
    .splash-progress { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 200px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.06); overflow: hidden; opacity: 0; animation: fadeUp 0.8s ease 1.2s forwards; }
    .splash-progress-bar { height: 100%; width: 0%; border-radius: 2px; background: linear-gradient(90deg, #2563EB, #3B82F6); animation: progressFill 15s linear 0s forwards; }
    .splash-skip { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(248,250,252,0.25); background: none; border: none; cursor: pointer; padding: 8px 16px; border-radius: 20px; transition: all 0.3s; opacity: 0; animation: fadeUp 0.8s ease 2s forwards; }
    .splash-skip:hover { color: rgba(248,250,252,0.6); background: rgba(255,255,255,0.04); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes progressFill { from { width: 0%; } to { width: 100%; } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    .splash-glow { position: fixed; top: 50%; left: 50%; width: 500px; height: 500px; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.06) 0%, transparent 70%); pointer-events: none; animation: pulseGlow 4s ease-in-out infinite; z-index: 0; }
    @media (max-width: 480px) {
      .splash-logo span { font-size: 17px; }
      .splash-tagline { font-size: 11px; }
      .splash-progress { width: 160px; bottom: 32px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="splash-glow"></div>
  <canvas id="splash-canvas"></canvas>
  <div id="splash-ui">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      <span>MedLink SA</span>
    </div>
    <p class="splash-tagline">The Future of Healthcare, Available Today.</p>
    <div class="splash-progress"><div class="splash-progress-bar"></div></div>
    <button class="splash-skip" onclick="redirect()">Skip →</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('splash-canvas');
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.3, 8);

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
    keyLight.position.set(5, 8, 7);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x3B82F6, 0.6);
    fillLight.position.set(-4, 2, 5);
    scene.add(fillLight);
    const rimLight = new THREE.DirectionalLight(0x60A5FA, 0.5);
    rimLight.position.set(0, -4, -5);
    scene.add(rimLight);

    // Build heart geometry
    const heartGroup = new THREE.Group();
    const mat = new THREE.MeshPhysicalMaterial({
      color: 0xDC2626,
      roughness: 0.3,
      metalness: 0.1,
      clearcoat: 0.4,
      clearcoatRoughness: 0.3,
      envMapIntensity: 1.2,
    });

    const baseR = 0.95;
    // Left lobe
    const l = new THREE.Mesh(new THREE.SphereGeometry(baseR, 32, 32), mat);
    l.position.set(-0.5, 0.25, 0);
    heartGroup.add(l);
    // Right lobe
    const r = new THREE.Mesh(new THREE.SphereGeometry(baseR, 32, 32), mat);
    r.position.set(0.5, 0.25, 0);
    heartGroup.add(r);
    // Bottom chambers
    const b1 = new THREE.Mesh(new THREE.SphereGeometry(0.42, 32, 32), mat);
    b1.position.set(0, -0.7, 0);
    heartGroup.add(b1);
    const b2 = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), mat);
    b2.position.set(0, -1.05, 0);
    heartGroup.add(b2);
    // Top (aorta)
    const t = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.5, 16), mat);
    t.position.set(0, 1.4, 0);
    heartGroup.add(t);

    // Scale up
    heartGroup.scale.set(2.2, 2.2, 2.2);
    scene.add(heartGroup);

    // Particles
    const particleCount = 120;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 14;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
      size: 0.04,
      color: 0x3B82F6,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // Interaction
    let targetRotX = 0;
    let targetRotY = 0;
    let currentRotX = 0;
    let currentRotY = 0;
    let isDragging = false;
    let prevMouseX = 0;
    let prevMouseY = 0;

    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      prevMouseX = e.clientX;
      prevMouseY = e.clientY;
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - prevMouseX;
      const dy = e.clientY - prevMouseY;
      targetRotY += dx * 0.01;
      targetRotX += dy * 0.01;
      prevMouseX = e.clientX;
      prevMouseY = e.clientY;
    });
    canvas.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      isDragging = true;
      prevMouseX = t.clientX;
      prevMouseY = t.clientY;
    }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const t = e.touches[0];
      const dx = t.clientX - prevMouseX;
      const dy = t.clientY - prevMouseY;
      targetRotY += dx * 0.01;
      targetRotX += dy * 0.01;
      prevMouseX = t.clientX;
      prevMouseY = t.clientY;
    }, { passive: true });
    canvas.addEventListener('touchend', () => { isDragging = false; }, { passive: true });

    // Auto-rotation
    let autoRotate = true;
    let autoRotateTimer = 0;
    canvas.addEventListener('mousedown', () => { autoRotate = false; clearTimeout(autoRotateTimer); });
    canvas.addEventListener('touchstart', () => { autoRotate = false; clearTimeout(autoRotateTimer); });
    canvas.addEventListener('mouseup', () => {
      autoRotateTimer = setTimeout(() => { autoRotate = true; }, 2000);
    });
    canvas.addEventListener('touchend', () => {
      autoRotateTimer = setTimeout(() => { autoRotate = true; }, 2000);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Heartbeat
      const beat = Math.sin(t * 3) * 0.025 + 1;
      const beat2 = Math.sin(t * 3 + 1) * 0.015;
      heartGroup.scale.setScalar(beat + beat2 * 0.5);
      heartGroup.position.y = Math.sin(t * 0.5) * 0.03;

      // Auto-rotate
      if (autoRotate) {
        targetRotY += 0.003;
      }

      currentRotX += (targetRotX - currentRotX) * 0.05;
      currentRotY += (targetRotY - currentRotY) * 0.05;
      heartGroup.rotation.x = currentRotX;
      heartGroup.rotation.y = currentRotY;

      // Particles drift
      const pos = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        pos[i * 3] += Math.sin(t * 0.3 + i) * 0.001;
        pos[i * 3 + 1] += Math.cos(t * 0.2 + i) * 0.001;
        pos[i * 3 + 2] += Math.sin(t * 0.25 + i * 2) * 0.001;
        if (Math.abs(pos[i * 3]) > 7) pos[i * 3] *= -0.9;
        if (Math.abs(pos[i * 3 + 1]) > 7) pos[i * 3 + 1] *= -0.9;
        if (Math.abs(pos[i * 3 + 2]) > 7) pos[i * 3 + 2] *= -0.9;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>

  <script>
    function redirect() {
      window.location.href = '/';
    }
    setTimeout(redirect, 15000);
  </script>
</body>
</html>
