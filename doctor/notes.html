<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Doctor Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="depth-bg">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>
    <div class="dashboard-layout">
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>MedLink SA</h2>
                <span class="role-badge">Doctor</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="patients.html" class="nav-item">Patients</a>
                <a href="calendar.html" class="nav-item">Calendar</a>
                <a href="prescriptions.html" class="nav-item">Prescriptions</a>
                <a href="followups.html" class="nav-item">Follow-ups</a>
                <a href="notes.html" class="nav-item active">Notes</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="nav-item text-danger">Logout</button>
            </div>
        </aside>
        <div class="main-wrapper">
            <header class="topbar glass-card">
                <div class="topbar-search">
                    <input type="text" placeholder="Search..." class="glass-input">
                </div>
                <div class="topbar-actions">
                    <div class="user-profile">
                        <span id="user-name-display">Doctor</span>
                    </div>
                </div>
            </header>
            <main class="main-content">
                <div class="page-content">
                    <header class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h1>Clinical Notes</h1>
                        <button class="btn btn-primary" style="padding: 0.5rem 1rem; border-radius: 4px; border: none; background: var(--primary); color: white; cursor: pointer;">New Note</button>
                    </header>
                    <div class="content-section glass-card">
                        <h2>Recent Notes</h2>
                        <div class="list-container" style="margin-top: 1rem;">
                            <div class="list-item" style="display: flex; justify-content: space-between; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                <div><strong>John Doe</strong> - Patient reports improved symptoms after medication.</div>
                                <div style="color: var(--text-secondary);">Yesterday</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script>window.auth.requireAuth(['doctor']);</script>
</body>
</html>
