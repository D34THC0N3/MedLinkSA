<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Doctor Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="depth-bg">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>
    <div class="dashboard-layout">
        <aside class="sidebar glass-card">
            <div class="sidebar-header">
                <h2>MedLink SA</h2>
                <span class="role-badge">Doctor</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="patients.html" class="nav-item">Patients</a>
                <a href="calendar.html" class="nav-item active">Calendar</a>
                <a href="prescriptions.html" class="nav-item">Prescriptions</a>
                <a href="followups.html" class="nav-item">Follow-ups</a>
                <a href="notes.html" class="nav-item">Notes</a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="nav-item text-danger">Logout</button>
            </div>
        </aside>
        <div class="main-wrapper">
            <header class="topbar glass-card">
                <div class="topbar-search">
                    <input type="text" placeholder="Search..." class="glass-input">
                </div>
                <div class="topbar-actions">
                    <div class="user-profile">
                        <span id="user-name-display">Doctor</span>
                    </div>
                </div>
            </header>
            <main class="main-content">
                <div class="page-content">
                    <header class="page-header">
                        <h1>Calendar & Appointments</h1>
                    </header>
                    <div class="content-section glass-card">
                        <div class="calendar-container liquid-glass" style="min-height: 400px; display: flex; align-items: center; justify-content: center;">
                            <!-- Placeholder for Calendar UI -->
                            <h2 style="text-align: center; padding: 2rem; color: var(--text-secondary);">Calendar View Interactive Component</h2>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script>window.auth.requireAuth(['doctor']);</script>
</body>
</html>
