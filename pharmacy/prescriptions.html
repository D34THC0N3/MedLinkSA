<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescriptions - MedLink SA</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/glassmorphism.css">
</head>
<body>
    <div class="depth-bg">
        <div class="layer layer-1"></div>
        <div class="layer layer-2"></div>
        <div class="layer layer-3"></div>
    </div>
    
    <aside class="sidebar liquid-glass">
        <div class="logo">
            <h2>MedLink SA</h2>
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="prescriptions.html" class="active">Prescriptions</a></li>
                <li><a href="inventory.html">Inventory</a></li>
            </ul>
        </nav>
    </aside>

    <header class="topbar glass-card">
        <div class="page-title">
            <h1>Prescriptions Management</h1>
        </div>
        <div class="user-profile">
            <span>Pharmacist User</span>
        </div>
    </header>

    <main class="main-content">
        <div class="page-content">
            <div class="glass-card liquid-glass">
                <h2>Pending Prescriptions</h2>
                <table class="data-table" style="width: 100%; text-align: left; margin-top: 15px;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient</th>
                            <th>Medication</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#10045</td>
                            <td>Jane Doe</td>
                            <td>Amoxicillin 500mg</td>
                            <td><span class="status pending">Pending</span></td>
                            <td><button class="btn btn-small">Fulfill</button></td>
                        </tr>
                        <tr>
                            <td>#10046</td>
                            <td>John Smith</td>
                            <td>Lisinopril 10mg</td>
                            <td><span class="status ready">Ready</span></td>
                            <td><button class="btn btn-small">Dispense</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script>window.auth.requireAuth(['pharmacy']);</script>
</body>
</html>
