<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bed Tracker - MedLink SA</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="depth-bg">
        <div class="blob"></div>
    </div>

    <div class="app-layout">
        <aside class="sidebar glass-card">
            <div class="brand">MedLink SA</div>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="queue.html">Queue Management</a>
                <a href="beds.html" class="active">Bed Tracker</a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="topbar glass-card">
                <h1>Hospital Portal - Beds</h1>
            </header>

            <main class="main-content">
                <div class="page-content">
                    <div class="glass-card">
                        <h2>Bed Availability</h2>
                        <div class="bed-grid">
                            <div class="liquid-glass bed-card">Ward A: 12 Available</div>
                            <div class="liquid-glass bed-card">Ward B: 5 Available</div>
                            <div class="liquid-glass bed-card">ICU: 2 Available</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script>window.auth.requireAuth(['hospital']);</script>
</body>
</html>
