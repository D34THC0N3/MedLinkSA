<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register as Facility – MedLink SA</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/glassmorphism.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .back-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      color: var(--text-primary);
      font-size: var(--fs-sm);
      font-weight: 500;
      margin-bottom: 24px;
      transition: all var(--transition-base);
    }
    .back-nav:hover { background: rgba(255,255,255,0.08); border-color: rgba(29,140,145,0.4); }
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(29,140,145,0.15);
      border: 1px solid rgba(29,140,145,0.3);
      color: var(--text-primary);
      font-size: var(--fs-xs);
      font-weight: 700;
      margin-bottom: 14px;
    }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 540px) { .form-grid-2 { grid-template-columns: 1fr; } }
    .auth-form-wrapper { max-height: 70vh; overflow-y: auto; }
    .auth-form-wrapper::-webkit-scrollbar { width: 4px; }
    .auth-form-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body class="page-base">
  <div id="page-transition-curtain" class="transition-curtain">
    <div class="transition-curtain-glow"></div>
    <div class="transition-curtain-logo">
      <i data-lucide="activity" style="width:40px;height:40px;"></i>
      <span>MedLink SA</span>
    </div>
  </div>

  <div class="auth-page">
    <div class="auth-left scroll-reveal reveal-left">
      <div class="auth-container">
        <a href="get-started.html" class="back-nav">
          <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
          Back to roles
        </a>
        <a href="index.html" class="auth-logo" style="margin-bottom:20px;">
          <div class="auth-logo-icon"><i data-lucide="activity" style="color:white;"></i></div>
          <span class="auth-logo-text">MedLink SA</span>
        </a>

        <div class="auth-form-wrapper liquid-glass" style="padding: 32px;">
          <div class="role-badge">
            <i data-lucide="building-2" style="width:16px;height:16px;"></i>
            Facility Registration
          </div>

          <div class="auth-header" style="margin-bottom: 22px;">
            <h1 class="auth-title">Register your facility</h1>
            <p class="auth-subtitle">Hospitals, clinics, and pharmacies register here</p>
          </div>

          <form onsubmit="handleRegister(event, 'facility')">
            <div class="form-group">
              <label class="form-label">Facility Name</label>
              <input type="text" class="form-input" placeholder="Netcare Sunninghill Hospital" required />
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Facility Type</label>
                <select class="form-select" required>
                  <option value="">Select type</option>
                  <option>Hospital (Private)</option>
                  <option>Hospital (Public)</option>
                  <option>Clinic</option>
                  <option>Pharmacy</option>
                  <option>Diagnostic Centre</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Registration Number</label>
                <input type="text" class="form-input" placeholder="Facility / Practice number" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Physical Address</label>
              <input type="text" class="form-input" placeholder="123 Main Road, Sandton, Johannesburg" required />
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">City</label>
                <input type="text" class="form-input" placeholder="Johannesburg" required />
              </div>
              <div class="form-group">
                <label class="form-label">Province</label>
                <select class="form-select" required>
                  <option value="">Select province</option>
                  <option>Gauteng</option>
                  <option>Western Cape</option>
                  <option>KwaZulu-Natal</option>
                  <option>Eastern Cape</option>
                  <option>Free State</option>
                  <option>Limpopo</option>
                  <option>Mpumalanga</option>
                  <option>North West</option>
                  <option>Northern Cape</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Contact Email</label>
              <input type="email" class="form-input" placeholder="admin@hospital.co.za" required />
            </div>
            <div class="form-group">
              <label class="form-label">Contact Phone</label>
              <input type="tel" class="form-input" placeholder="+27 11 555 0000" required />
            </div>
            <div class="form-group">
              <label class="form-label">Number of Beds (if hospital)</label>
              <input type="number" class="form-input" placeholder="e.g. 250" min="0" />
            </div>
            <div class="form-group">
              <label class="form-label">Registration Documents (PDF)</label>
              <div class="file-upload-area" onclick="this.querySelector('input').click()">
                <input type="file" accept=".pdf" multiple style="display:none;" />
                <div class="file-upload-icon"><i data-lucide="upload-cloud" style="width:32px;height:32px;color:var(--text-secondary);"></i></div>
                <p style="font-size:var(--fs-sm);color:var(--text-secondary);margin:0;">Upload facility registration certificate, license, or accreditation documents</p>
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Create a strong password" required minlength="8" />
              </div>
              <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" placeholder="Re-enter password" required minlength="8" />
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Register Facility</button>
            <p style="text-align:center;font-size:var(--fs-xs);color:var(--text-tertiary);margin-top:14px;">
              Already registered? <a href="login.html" style="color:var(--primary-light);">Sign in</a>
            </p>
          </form>
        </div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-illustration">
        <div class="float-el float-el-1">
          <div class="float-icon" style="background:linear-gradient(135deg, #2563eb, #0ea5e9);"><i data-lucide="building-2" style="width:18px;height:18px;color:#fff;"></i></div>
          <div class="float-text"><span class="lbl">Facilities onboarded</span><span class="val">340+</span></div>
        </div>
        <div class="float-el float-el-2">
          <div class="float-icon" style="background:linear-gradient(135deg, #F59E0B, #EF4444);"><i data-lucide="bed-double" style="width:18px;height:18px;color:#fff;"></i></div>
          <div class="float-text"><span class="lbl">Beds managed</span><span class="val">12,400</span></div>
        </div>
        <img src="../Gemini_Generated_Image_hgp1gwhgp1gwhgp1.png" alt="Facility registration" style="width:100%;border-radius:var(--radius-xl);position:relative;z-index:2;" onerror="this.style.display='none'" />
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      setTimeout(() => {
        btn.textContent = '✓ Facility Registered';
        btn.style.background = 'linear-gradient(135deg, #10B981, #059669)';
        setTimeout(() => { window.location.href = 'hospital/dashboard.html'; }, 800);
      }, 1200);
    }
    lucide.createIcons();
  </script>
</body>
</html>
